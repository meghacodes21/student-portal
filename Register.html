<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | student Portal</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <form id="registerForm" class="login-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join us to make your voice heard</p>
        
        <div class="input-group">
            <input type="text" id="regName" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <input type="email" id="regEmail" placeholder="Email Address" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="regPass" placeholder="Password" required>
        </div>

        <div class="input-group">
            <input type="password" id="regCPass" placeholder="Confirm Password" required>
        </div>
        
        <button type="submit" class="login-btn">Register</button>
        
        <p class="signup-link">Already have an account? <a href="index.html">Login</a></p>
    </form>
</div>

<script src="Script.js"></script>
</body>
</html>
